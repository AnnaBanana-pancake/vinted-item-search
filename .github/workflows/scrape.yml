name: Vinted Telefon Scraper

on:
  # Automatikus futtatás: minden nap reggel 7:00 (Budapest idő = UTC+2 → 05:00 UTC)
  schedule:
    - cron: "0 5 * * *"

  # Kézi futtatás a GitHub webes felületéről (Actions → Run workflow gomb)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --staged --quiet || git commit -m "Frissített találatok: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
